<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="bg-grid"></div>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <div class="container">

        <header>
            <div class="logo-mark">WX</div>
            <div class="header-text">
                <h1>WEATHER TRACKER</h1>
                <p class="tagline">Real-time atmospheric data</p>
            </div>
        </header>

        <div class="parent-card">

            <div class="card card-left">
                <div class="card-label">SEARCH</div>
                <div class="input-group">
                    <input id="cityInput" placeholder="Enter city name…" autocomplete="off">
                    <button id="searchBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </button>
                </div>

                <div class="divider"></div>

                <div class="card-label">HISTORY</div>
                <div class="history" id="history"></div>
            </div>

            <div class="card card-right">
                <div class="card-label">CONDITIONS</div>
                <div id="weather">
                    <div class="empty-state">
                        <div class="empty-icon">◎</div>
                        <p>Search a city to see weather data</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
